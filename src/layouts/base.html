<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{description}}">
  <link rel="icon" type="image/svg+xml" href="../assets/themeli-icon.svg">
  <link rel="canonical" href="https://themeli.gr/{{langCode}}/{{pageName}}">
  <link rel="alternate" hreflang="en" href="https://themeli.gr/en/{{pageName}}">
  <link rel="alternate" hreflang="el" href="https://themeli.gr/el/{{pageName}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:url" content="https://themeli.gr/{{langCode}}/{{pageName}}">
  <meta property="og:image" content="https://themeli.gr/assets/landing-poster.jpg">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="{{ogLocale}}">
  <meta property="og:site_name" content="THEMELI S.A.">
  <meta name="twitter:card" content="summary_large_image">
  <title>{{title}}</title>
  <link rel="preload" href="../assets/fonts/CFModGrotesk-RegularExpanded.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
{{nav}}

  <header class="menu" role="banner">
    <a href="{{homeLink}}" class="menu-logo">
      <img src="../assets/themeli-icon.svg" alt="Themeli" width="75" height="50">
    </a>
    <div class="menu-right">
      <a class="lang-switch" href="{{langSwitchHref}}" data-lang-switch>{{langSwitch}}</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main{{mainAttrs}} id="main-content">
{{content}}
  </main>

  <footer class="footer">
    <div class="footer-gradient"></div>
    <div class="footer-inner">
      <div class="footer-logo">
        <a href=""><img src="../assets/themeli-footer-logo.svg" alt="Themeli" width="140" height="150"></a>
      </div>
      <div class="footer-columns">
        <div class="footer-col">
          <h4>{{footerAddressLabel}}</h4>
          <a href="https://www.google.com/maps?q=38.03279391343416,23.774540665648086" target="_blank" rel="noopener">{{footerAddressBody}}</a>
        </div>
        <div class="footer-col">
          <h4>{{footerInfoLabel}}</h4>
          <div class="email-wrapper">
            <a href="#" class="email-trigger" data-email="INFO@THEMELI.GR">INFO@THEMELI.GR</a>
            <div class="email-popup">
              <a href="mailto:INFO@THEMELI.GR" class="email-popup-option">{{footerSendEmail}}</a>
              <button class="email-popup-option email-copy" data-email="INFO@THEMELI.GR">{{footerCopyAddress}}</button>
            </div>
          </div>
          <div class="phone-wrapper">
            <a href="#" class="phone-trigger">T: +30 2102717720</a>
            <div class="email-popup">
              <a href="tel:+302102717720" class="email-popup-option">{{footerCall}}</a>
              <button class="email-popup-option phone-copy" data-phone="+30 2102717720">{{footerCopyNumber}}</button>
            </div>
          </div>
          <p>F: +30 2102717723</p>
        </div>
        <div class="footer-col">
          <h4>{{footerSocialsLabel}}</h4>
          <a href="#">Linkedin</a>
          <a href="#">Facebook</a>
          <a href="#">Instagram</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>{{footerCopyright}}</p>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTop" aria-label="Back to top">
    <svg viewBox="0 0 16 16"><polyline points="3 10 8 5 13 10"/></svg>
  </button>

{{scripts}}  <script src="../subsidiaries-data.js"></script>
  <script src="../projects-data.js"></script>
  <script src="../script.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "THEMELI S.A.",
    "alternateName": "ΘΕΜΕΛΗ Α.Ε.",
    "url": "https://themeli.gr",
    "logo": "https://themeli.gr/assets/themeli-logo.svg",
    "foundingDate": "1923",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "104 Kapodistriou str.",
      "addressLocality": "Nea Ionia, Athens",
      "postalCode": "142 35",
      "addressCountry": "GR"
    },
    "telephone": "+302102717720",
    "email": "INFO@THEMELI.GR"
  }
  </script>
</body>
</html>
