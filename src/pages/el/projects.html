<!--
title: THEMELI — Έργα
description: ΘΕΜΕΛΙ Α.Ε. Έργα — Περιηγηθείτε στο χαρτοφυλάκιο μεγάλων έργων υποδομών, μεταφορών, ενέργειας και κτιριακών κατασκευών σε όλη την Ελλάδα.
mainClass: projects-page
mainId:
scripts: ../assets/vendor/leaflet/leaflet.js, ../assets/greece-prefectures.js
-->
    <div class="page-header">
      <h1>Έργα</h1>
    </div>

    <!-- Toolbar: filter + view toggles + count -->
    <div class="proj-toolbar reveal">
      <div class="proj-toolbar-left">
        <button class="proj-filter-toggle" id="projFilterToggle" aria-label="Toggle filters">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="4" x2="17" y2="4"/><line x1="1" y1="9" x2="17" y2="9"/><line x1="1" y1="14" x2="17" y2="14"/><circle cx="5" cy="4" r="1.5" fill="currentColor"/><circle cx="12" cy="9" r="1.5" fill="currentColor"/><circle cx="8" cy="14" r="1.5" fill="currentColor"/></svg>
          <span>Φίλτρα</span>
        </button>
        <span class="proj-count" id="projCount">26 Έργα</span>
      </div>
      <div class="proj-view-toggles" id="projViewToggles">
        <button class="proj-view-btn is-active" data-view="grid" aria-label="Grid view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="0" y="0" width="8" height="8" rx="1"/><rect x="10" y="0" width="8" height="8" rx="1"/><rect x="0" y="10" width="8" height="8" rx="1"/><rect x="10" y="10" width="8" height="8" rx="1"/></svg>
        </button>
        <button class="proj-view-btn" data-view="list" aria-label="List view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="0" y="1" width="18" height="2" rx="1"/><rect x="0" y="5.5" width="18" height="2" rx="1"/><rect x="0" y="10" width="18" height="2" rx="1"/><rect x="0" y="14.5" width="18" height="2" rx="1"/></svg>
        </button>
        <button class="proj-view-btn" data-view="map" aria-label="Map view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 16s-6-5.7-6-9.2A6 6 0 0 1 15 6.8C15 10.3 9 16 9 16z"/><circle cx="9" cy="7" r="2" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <!-- Active filter chips -->
    <div class="proj-chips" id="projChips"></div>

    <!-- Filter panel -->
    <div class="proj-filters" id="projFilters">
      <div class="proj-filters-inner">
        <div class="proj-filters-col">
          <span class="proj-filters-label">Κατάσταση</span>
          <div class="proj-filters-list">
            <button class="proj-filter-btn" data-category="status" data-filter="Completed">Ολοκληρωμένα</button>
            <button class="proj-filter-btn" data-category="status" data-filter="In Progress">Σε Εξέλιξη</button>
          </div>
        </div>
        <div class="proj-filters-col">
          <span class="proj-filters-label">Τυπολογία</span>
          <div class="proj-filters-list">
            <button class="proj-filter-btn" data-category="typology" data-filter="Buildings">Κτίρια</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Utility Networks">Δίκτυα Κοινής Ωφέλειας</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Industrial &amp; Energy">Βιομηχανικά &amp; Ενέργεια</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Roadworks">Οδοποιία</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Urban Redevelopment">Αστική Ανάπλαση</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Ports &amp; Marine">Λιμάνια &amp; Θαλάσσια</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Railways">Σιδηρόδρομοι</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Dams">Φράγματα</button>
            <button class="proj-filter-btn" data-category="typology" data-filter="Tunnels">Σήραγγες</button>
          </div>
        </div>
        <div class="proj-filters-col">
          <span class="proj-filters-label">Τοποθεσία</span>
          <div class="proj-filters-list">
            <button class="proj-filter-btn" data-category="region" data-filter="Attica">Αττική</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Peloponnese">Πελοπόννησος</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Central Greece">Στερεά Ελλάδα</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Thessaly">Θεσσαλία</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Northern Greece">Βόρεια Ελλάδα</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Crete">Κρήτη</button>
            <button class="proj-filter-btn" data-category="region" data-filter="Islands">Νησιά</button>
          </div>
        </div>
        <div class="proj-filters-actions">
          <button class="proj-apply-btn" id="projApply">Εφαρμογή</button>
          <button class="proj-clear-btn" id="projClearAll">&mdash; Καθαρισμός</button>
        </div>
      </div>
    </div>

    <!-- ===== GRID VIEW (rendered by JS from projects-data.js) ===== -->
    <div class="proj-grid reveal" id="projGridView"></div>

    <!-- ===== LIST VIEW ===== -->
    <div class="proj-table" id="projListView" style="display:none">
      <div class="proj-row proj-row-header">
        <button class="proj-col proj-col-name proj-sort-btn" data-sort="name">Έργο</button>
        <button class="proj-col proj-col-type proj-sort-btn" data-sort="typology">Τυπολογία</button>
        <button class="proj-col proj-col-loc proj-sort-btn" data-sort="location">Τοποθεσία</button>
        <button class="proj-col proj-col-year proj-sort-btn" data-sort="year">Έτος</button>
      </div>
    </div>

    <!-- ===== PAGINATION ===== -->
    <nav class="proj-pagination" id="projPagination" aria-label="Σελιδοποίηση έργων"></nav>

    <!-- ===== MAP VIEW (Leaflet) ===== -->
    <div class="proj-map" id="projMapView" style="display:none">
      <div class="proj-map-leaflet" id="projLeafletMap"></div>

      <aside class="proj-map-card" id="projMapCard" aria-hidden="true">
        <button class="proj-map-card-close" id="projMapCardClose" aria-label="Κλείσιμο">&times;</button>
        <div class="proj-map-card-photo" id="projMapCardPhoto">
          <span class="proj-map-card-kind" id="projMapCardKind">●</span>
        </div>
        <div class="proj-map-card-body">
          <span class="proj-map-card-tag" id="projMapCardTag">Τυπολογία</span>
          <h2 class="proj-map-card-title" id="projMapCardTitle">Τίτλος έργου</h2>
          <div class="proj-map-card-meta">
            <span class="k" id="projMapCardYear">—</span>
            <span>·</span>
            <span id="projMapCardLocation">—</span>
          </div>
          <p class="proj-map-card-desc" id="projMapCardDesc"></p>
          <a class="proj-map-card-cta" id="projMapCardCta" href="#">Δείτε το έργο &rarr;</a>
        </div>
      </aside>

      <div class="proj-map-hint">Πατήστε ένα σημείο για προβολή &middot; κλικ εκτός για κλείσιμο &middot; <kbd>Esc</kbd></div>
    </div>
