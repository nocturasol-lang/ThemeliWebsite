    <div class="page-header">
      <h1>Subsidiaries</h1>
    </div>

    <div class="subsidiaries-page">
    <!-- Logo Grid (initial state) -->
    <div class="subs-grid" id="subsGrid">
      <div class="sub-logo reveal" data-sub="themos">
        <img src="../assets/themos.svg" alt="Themos">
        <span class="sub-name">THEMOS</span>
      </div>
      <div class="sub-logo reveal reveal-delay-1" data-sub="thermis">
        <img src="../assets/thermis.svg" alt="Thermis">
        <span class="sub-name">THERMIS</span>
      </div>
      <div class="sub-logo reveal reveal-delay-2" data-sub="tetrapolis">
        <img src="../assets/tetrapolis.svg" alt="Tetrapolis">
        <span class="sub-name">TETRAPOLIS</span>
      </div>
    </div>

    <!-- Detail Views (hidden by default) -->
    <div class="sub-detail" id="subDetail">
      <button class="sub-back" id="subBack" aria-label="Back to subsidiaries">Back</button>
      <div class="sub-detail-inner">
        <div class="sub-detail-text">
          <div class="sub-detail-header">
            <div class="sub-detail-logo" id="subLogo"></div>
            <div>
              <h1 class="sub-detail-name" id="subName"></h1>
              <p class="sub-detail-subtitle" id="subSubtitle"></p>
            </div>
          </div>
          <div class="sub-detail-desc" id="subDesc"></div>
          <div class="sub-featured-grid" id="subFeatured"></div>
        </div>
      </div>
    </div>
    </div>
