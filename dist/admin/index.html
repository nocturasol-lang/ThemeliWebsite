<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMELI — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2e2e2f;
      --bg-dark: #252526;
      --bg-card: #353536;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.25);
      --white: #ffffff;
      --gray: rgba(255,255,255,0.5);
      --accent: #FF731E;
      --danger: #d4574e;
      --font-display: 'CF Mod Grotesk', sans-serif;
      --font-body: 'CF Mod Grotesk', sans-serif;
    }

    /* Login gate — hides admin until authenticated */
    body.admin-gated .admin-header,
    body.admin-gated .admin-main,
    body.admin-gated .modal-overlay {
      display: none !important;
    }

    .login-gate {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-gate.is-hidden {
      display: none;
    }

    .login-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 380px;
      max-width: 90vw;
      text-align: center;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-box .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .login-box.shake {
      animation: shake 0.4s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .admin-header h1 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .admin-header h1 span {
      color: var(--gray);
      font-weight: 400;
      font-size: 14px;
      margin-left: 12px;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 24px;
      border: 1px solid var(--border);
      background: none;
      color: var(--white);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.04);
    }

    .btn-accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent:hover {
      background: rgba(200,184,154,0.1);
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(212,87,78,0.1);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 11px;
    }

    .btn-publish {
      border-color: #6abf69;
      color: #6abf69;
    }

    .btn-publish:hover {
      background: rgba(106,191,105,0.1);
    }

    .btn-import {
      cursor: pointer;
      border-color: rgba(255,255,255,0.3);
    }

    .btn-import:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .admin-status {
      font-size: 12px;
      font-weight: 400;
      color: var(--gray);
      margin-right: 8px;
    }

    .admin-status.is-published {
      color: #6abf69;
    }

    /* Main */
    .admin-main {
      padding: 32px 40px;
    }

    /* Table */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }

    .admin-table th {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-hover);
    }

    .admin-table td {
      font-size: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .admin-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .admin-table .thumb {
      width: 60px;
      height: 40px;
      background-color: var(--bg);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--border);
      filter: grayscale(80%);
    }

    .admin-table .cell-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
    }

    .admin-table .cell-actions {
      display: flex;
      gap: 6px;
    }

    .cell-map-pos {
      font-size: 12px;
      color: var(--gray);
      font-family: monospace;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      width: 800px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group select option {
      background: var(--bg-dark);
    }

    /* Map picker */
    .map-picker {
      grid-column: 1 / -1;
      margin-top: 8px;
    }

    .map-picker label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      display: block;
      margin-bottom: 8px;
    }

    .map-picker-coords {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .map-picker-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border);
      cursor: crosshair;
      user-select: none;
    }

    .map-picker-container img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.33;
    }

    .map-picker-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--white);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      box-shadow: 0 0 0 3px rgba(200,184,154,0.3);
    }

    .map-picker-dot.is-placed {
      display: block;
    }

    /* Image upload area */
    .img-upload-area {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--bg-dark);
      border: 2px dashed var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    .img-upload-area:hover,
    .img-upload-area.is-dragover {
      border-color: var(--accent);
      background: rgba(200,184,154,0.04);
    }

    .img-upload-area.has-image {
      border-style: solid;
      border-color: var(--border);
    }

    .img-preview {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      position: absolute;
      inset: 0;
    }

    .img-upload-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      color: var(--gray);
      font-size: 13px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .img-upload-area.has-image .img-upload-prompt {
      display: none;
    }

    .btn-remove-img {
      margin-top: 8px;
      border-color: var(--danger);
      color: var(--danger);
      font-size: 11px;
      padding: 4px 12px;
    }

    .btn-remove-img:hover {
      background: rgba(212,87,78,0.1);
    }

    /* Form footer */
    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray);
      font-size: 15px;
    }
  </style>
</head>
<body class="admin-gated">

  <!-- Login gate -->
  <div class="login-gate" id="loginGate">
    <div class="login-box">
      <h1 class="login-title">THEMELI</h1>
      <p class="login-subtitle">Admin Panel</p>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@themeli.gr" autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn btn-accent login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <header class="admin-header">
    <h1>THEMELI <span>Admin Panel</span></h1>
    <div class="admin-actions">
      <span class="admin-status" id="adminStatus"></span>
      <a href="../en/projects.html" class="btn btn-sm" target="_blank">View Site</a>
      <button class="btn btn-sm btn-accent" id="addProjectBtn">+ Add Project</button>
      <button class="btn btn-sm" id="exportBtn">Export File</button>
      <label class="btn btn-sm btn-import" for="importFile">Import File</label>
      <input type="file" id="importFile" accept=".js" style="display:none">
      <button class="btn btn-sm btn-danger" id="logoutBtn">Logout</button>
    </div>
  </header>

  <main class="admin-main">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Year</th>
          <th>Typology</th>
          <th>Location</th>
          <th>Map</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
      </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">No projects yet. Click "+ Add Project" to get started.</div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Add Project</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="fName" placeholder="e.g. Athens Tramway Extension">
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="fYear" placeholder="e.g. 2004" min="1900" max="2100">
        </div>
        <div class="form-group">
          <label>Typology</label>
          <select id="fTypology">
            <option value="Buildings">Buildings</option>
            <option value="Railways">Railways</option>
            <option value="Roadworks">Roadworks</option>
            <option value="Tunnels">Tunnels</option>
            <option value="Industrial & Energy">Industrial & Energy</option>
            <option value="Utility Networks">Utility Networks</option>
            <option value="Dams">Dams</option>
            <option value="Ports & Marine">Ports & Marine</option>
            <option value="Urban Redevelopment">Urban Redevelopment</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="fLocation" placeholder="e.g. Athens">
        </div>
        <div class="form-group">
          <label>Architect</label>
          <input type="text" id="fArchitect" placeholder="e.g. Gehry Partners">
        </div>
        <div class="form-group">
          <label>Size</label>
          <input type="text" id="fSize" placeholder="e.g. 110,000 ft² / 10,219 m²">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="Completed">Completed</option>
            <option value="In Progress">In Progress</option>
            <option value="Planning">Planning</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date Completed</label>
          <input type="text" id="fDateCompleted" placeholder="e.g. 2003">
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="fDesc" placeholder="Brief project description..."></textarea>
        </div>
        <div class="form-group">
          <label>Project Image</label>
          <div class="img-upload-area" id="fImageDropzone">
            <div class="img-preview" id="fImagePreview"></div>
            <div class="img-upload-prompt" id="fImagePrompt">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Click or drop image</span>
            </div>
            <input type="file" id="fImageFile" accept="image/*" style="display:none">
          </div>
          <input type="hidden" id="fImage">
          <button type="button" class="btn btn-sm btn-remove-img" id="fImageRemove" style="display:none">Remove Image</button>
        </div>
        <div class="map-picker">
          <label>Map Position <span style="font-weight:300;text-transform:none;letter-spacing:0">(click on the map to place the dot)</span></label>
          <div class="map-picker-coords" id="mapPickerCoords">X: — Y: —</div>
          <div class="map-picker-container" id="mapPickerContainer">
            <img src="../assets/greece-map.png" alt="Greece">
            <div class="map-picker-dot" id="mapPickerDot"></div>
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn btn-accent" id="modalSave">Save Project</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="../projects-data.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
