<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>THEMELI — Πίνακας Διαχείρισης</title>
  <style>
    :root {
      --bg: #1a1a1c;
      --surface: #252526;
      --surface-2: #2d2d2f;
      --border: #3a3a3c;
      --text: #e5e5e7;
      --muted: #8e8e93;
      --accent: #ff731e;
      --accent-hover: #e66614;
      --ok: #34c759;
      --err: #ff453a;
      --warn: #ff9f0a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Header ── */
    .admin-header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
    .admin-header h1 { margin: 0; font-size: 1rem; font-weight: 500; letter-spacing: 0.02em; }
    .admin-header h1 span { color: var(--muted); font-weight: 400; margin-left: 0.5rem; }
    .admin-header .spacer { flex: 1; }

    /* ── Buttons ── */
    button, .btn { background: var(--border); color: var(--text); border: 0; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; line-height: 1.4; transition: background 0.15s; }
    button:hover, .btn:hover { background: #4a4a4c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--err); color: #fff; }
    .btn-danger:hover { background: #d93932; }
    .btn-ok { background: var(--ok); color: #fff; }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 12px; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    /* ── Inputs ── */
    input[type="text"], input[type="email"], input[type="password"], input[type="number"], select, textarea {
      background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px;
      padding: 0.5rem 0.75rem; width: 100%; font-family: inherit; font-size: 14px;
    }
    input:focus, select:focus, textarea:focus { outline: 0; border-color: var(--accent); }
    textarea { min-height: 70px; resize: vertical; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 0.3rem; }
    label.req::after { content: ' *'; color: var(--accent); }

    /* ── Login view ── */
    #loginView { max-width: 400px; margin: 6rem auto; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    #loginView h2 { margin: 0 0 1.5rem 0; }
    #loginView .row { margin-bottom: 1rem; }
    #loginView button { width: 100%; padding: 0.7rem; }

    /* ── Dashboard ── */
    #dashView.hidden, #loginView.hidden { display: none; }
    .toolbar { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .toolbar input[type="text"] { max-width: 320px; }
    .toolbar .spacer { flex: 1; }
    .results-count { color: var(--muted); font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table.projects { width: 100%; border-collapse: collapse; }
    table.projects th, table.projects td { padding: 0.65rem 0.9rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
    table.projects th { background: var(--surface); color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.04em; cursor: pointer; user-select: none; }
    table.projects th.sort-asc::after { content: ' ▲'; color: var(--accent); }
    table.projects th.sort-desc::after { content: ' ▼'; color: var(--accent); }
    table.projects tbody tr { transition: background 0.1s, opacity 0.15s; }
    table.projects tbody tr:hover { background: var(--surface); }
    table.projects tbody tr.row-hidden { opacity: 0.45; }
    table.projects tbody tr.row-hidden:hover { opacity: 1; }
    .vis-toggle { font-size: 14px; line-height: 1; }
    table.projects td.id-cell { color: var(--muted); font-variant-numeric: tabular-nums; }
    table.projects td.name-cell { font-weight: 500; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    table.projects td.status-cell span { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-Completed { background: rgba(52,199,89,0.15); color: var(--ok); }
    .status-InProgress { background: rgba(255,159,10,0.15); color: var(--warn); }
    .status-Planning { background: rgba(0,122,255,0.15); color: #0a84ff; }
    .map-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
    .map-indicator.placed { background: var(--accent); }
    .map-indicator.empty { background: var(--border); }
    .row-actions { display: flex; gap: 0.3rem; justify-content: flex-end; }

    /* ── Modal ── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 820px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 1rem; flex: 1; }
    .modal-body { padding: 1.25rem 1.5rem; max-height: calc(100vh - 200px); overflow-y: auto; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; justify-content: flex-end; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.25rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .row { margin-bottom: 1rem; }

    /* ── Image previews ── */
    .file-zone { border: 1px dashed var(--border); border-radius: 6px; padding: 0.75rem; background: var(--bg); }
    .file-previews { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .file-preview { position: relative; width: 80px; height: 80px; border-radius: 4px; overflow: hidden; background: var(--surface-2); }
    .file-preview img { width: 100%; height: 100%; object-fit: cover; }
    .file-preview .remove { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: #fff; border: 0; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 18px; padding: 0; }
    .file-preview .remove:hover { background: var(--err); }

    /* ── Status toast ── */
    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1rem; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); font-size: 13px; transform: translateY(120%); transition: transform 0.3s; z-index: 200; max-width: 400px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    #toast.show { transform: translateY(0); }
    #toast.ok { border-left: 3px solid var(--ok); }
    #toast.err { border-left: 3px solid var(--err); }

    /* ── Confirm ── */
    .confirm-box { padding: 1.5rem; }
    .confirm-box p { margin: 0 0 1rem 0; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.5rem; }

    /* Publish modal */
    .publish-modal { max-width: 440px; padding: 2rem 1.75rem 1.5rem; text-align: center; }
    .publish-icon { width: 64px; height: 64px; margin: 0 auto 1rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; line-height: 1; }
    .publish-icon.is-confirm { background: rgba(255,115,30,0.12); color: var(--accent); }
    .publish-icon.is-loading { background: rgba(255,115,30,0.12); }
    .publish-icon.is-success { background: rgba(52,199,89,0.15); color: var(--ok); }
    .publish-icon.is-error { background: rgba(255,69,58,0.15); color: var(--err); }
    .publish-icon .spinner { width: 28px; height: 28px; border-width: 3px; margin: 0; }
    .publish-body h3 { margin: 0 0 0.5rem; font-size: 1.05rem; font-weight: 500; letter-spacing: 0.01em; }
    .publish-body p { color: var(--muted); margin: 0 0 1.5rem; font-size: 13px; line-height: 1.55; }
    .publish-actions { display: flex; gap: 0.5rem; justify-content: center; }
    .publish-actions .btn, .publish-actions button, .publish-actions a { min-width: 110px; text-decoration: none; text-align: center; padding: 0.55rem 1rem; font-weight: 500; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ══════════════ LOGIN VIEW ══════════════ -->
  <div id="loginView">
    <h2>Σύνδεση Διαχείρισης</h2>
    <form id="loginForm">
      <div class="row">
        <label>Email</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="row">
        <label>Κωδικός</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary">Σύνδεση</button>
      <div id="loginError" style="color: var(--err); margin-top: 0.75rem; font-size: 13px; display: none;"></div>
    </form>
  </div>

  <!-- ══════════════ DASHBOARD VIEW ══════════════ -->
  <div id="dashView" class="hidden">
    <header class="admin-header">
      <h1>THEMELI <span>Πίνακας Διαχείρισης</span></h1>
      <span class="spacer"></span>
      <a href="../el/projects" target="_blank" class="btn" title="Προβολή δημόσιας σελίδας">Προβολή Σελίδας</a>
      <a href="inquiries" class="btn" id="inquiriesLink" style="position:relative;" title="Μηνύματα από τη φόρμα επικοινωνίας">Αιτήματα<span id="inqBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;border-radius:10px;padding:0 5px;font-size:10px;line-height:14px;min-width:14px;text-align:center;"></span></a>
      <button id="publishBtn" class="btn-primary">Δημοσίευση</button>
      <button id="logoutBtn" class="btn-ghost">Αποσύνδεση</button>
    </header>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Αναζήτηση (όνομα, τυπολογία, τοποθεσία)...">
      <span class="results-count" id="resultsCount"></span>
      <span class="spacer"></span>
      <button id="addBtn" class="btn-primary">+ Προσθήκη Έργου</button>
    </div>

    <div class="table-wrap">
      <table class="projects" id="projectsTable">
        <thead>
          <tr>
            <th data-sort="legacy_id" style="width:60px;">#</th>
            <th data-sort="name">Όνομα</th>
            <th data-sort="typology" style="width:150px;">Τυπολογία</th>
            <th data-sort="year" style="width:70px;">Έτος</th>
            <th data-sort="status" style="width:120px;">Κατάσταση</th>
            <th style="width:70px;">Χάρτης</th>
            <th style="width:280px; text-align:right;">Ενέργειες</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" class="loading"><span class="spinner"></span>Φόρτωση...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ══════════════ EDIT / ADD MODAL ══════════════ -->
  <div class="modal-backdrop" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Επεξεργασία Έργου</h2>
      </div>
      <div class="modal-body">
        <form id="projectForm">
          <div class="form-grid">
            <div><label class="req">Όνομα (EL)</label><input type="text" id="fName" required></div>
            <div><label>Name (EN)</label><input type="text" id="fNameEn"></div>
            <div class="full"><label>Περιγραφή (EL)</label><textarea id="fDesc"></textarea></div>
            <div class="full"><label>Description (EN)</label><textarea id="fDescEn"></textarea></div>
            <div><label>Τυπολογία</label><select id="fTypology">
              <option value="">—</option>
              <option>Buildings</option><option>Railways</option><option>Roadworks</option>
              <option>Tunnels</option><option>Industrial &amp; Energy</option><option>Utility Networks</option>
              <option>Dams</option><option>Ports &amp; Marine</option><option>Urban Redevelopment</option>
            </select></div>
            <div><label>Κατάσταση</label><select id="fStatus">
              <option>Completed</option><option>In Progress</option><option>Planning</option>
            </select></div>
            <div><label>Ορατότητα</label><select id="fVisibility">
              <option>Public</option><option>Hidden</option>
            </select></div>
            <div><label>Έτος Ολοκλήρωσης</label><input type="number" id="fYear" min="1900" max="2100"></div>
            <div><label>Έτος Έναρξης</label><input type="number" id="fYearStart" min="1900" max="2100"></div>
            <div><label>Τοποθεσία</label><input type="text" id="fLocation"></div>
            <div><label>Περιοχή</label><select id="fRegion">
              <option value="">—</option>
              <option>Attica</option><option>Peloponnese</option><option>Central Greece</option>
              <option>Thessaly</option><option>Northern Greece</option><option>Crete</option><option>Islands</option>
            </select></div>
            <div><label>Αρχιτέκτονας</label><input type="text" id="fArchitect"></div>
            <div><label>Μέγεθος</label><input type="text" id="fSize"></div>
            <div><label>Πελάτης</label><input type="text" id="fClient"></div>
            <div><label>Εργολάβος</label><input type="text" id="fContractor"></div>
            <div><label>Συμμετοχή</label><input type="text" id="fParticipation" placeholder="π.χ. 100%"></div>
            <div><label>Προϋπολογισμός</label><input type="number" id="fBudget" step="0.01" min="0"></div>
            <div><label>Ημ/νία Ολοκλήρωσης</label><input type="text" id="fDateCompleted"></div>
            <div></div>
            <div class="full">
              <label>Κύρια Εικόνα</label>
              <div class="file-zone">
                <input type="file" id="fHeroImage" accept="image/*">
                <div class="file-previews" id="heroPreview"></div>
              </div>
            </div>
            <div class="full">
              <label>Γκαλερί (πολλαπλά αρχεία)</label>
              <div class="file-zone">
                <input type="file" id="fGallery" accept="image/*" multiple>
                <div class="file-previews" id="galleryPreview"></div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-ghost" id="cancelBtn">Ακύρωση</button>
        <button type="button" class="btn-primary" id="saveBtn">Αποθήκευση</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ CONFIRM MODAL ══════════════ -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal" style="max-width: 440px;">
      <div class="confirm-box">
        <p id="confirmMsg"></p>
        <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
          <button type="button" class="btn-ghost" id="confirmCancel">Ακύρωση</button>
          <button type="button" class="btn-danger" id="confirmOk">Διαγραφή</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ PUBLISH MODAL ══════════════ -->
  <div class="modal-backdrop" id="publishModal">
    <div class="modal publish-modal">
      <div class="publish-body" id="publishBody"><!-- rendered by JS --></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    /* ════════════════════════════════════════════════════════════════
     * Themeli Admin — single-page UI over the local PHP/SQLite API.
     * ════════════════════════════════════════════════════════════════ */

    const API = '/api';

    async function api(path, opts = {}) {
      const init = Object.assign({ credentials: 'same-origin' }, opts);
      if (init.body && !(init.body instanceof FormData) && typeof init.body !== 'string') {
        init.headers = Object.assign({ 'Content-Type': 'application/json' }, init.headers || {});
        init.body = JSON.stringify(init.body);
      }
      const res = await fetch(API + path, init);
      let json = null;
      try { json = await res.json(); } catch (_) {}
      if (!res.ok || !json || json.ok === false) {
        const msg = (json && json.error) || ('HTTP ' + res.status);
        if (res.status === 401) showLogin();
        const err = new Error(msg);
        err.status = res.status;
        throw err;
      }
      return json.data;
    }

    async function updateInquiryBadge() {
      try {
        const items = await api('/inquiries.php');
        const pending = items.filter(i => !i.handled).length;
        const badge = document.getElementById('inqBadge');
        if (pending > 0) { badge.textContent = pending; badge.style.display = ''; }
        else { badge.style.display = 'none'; }
      } catch (_) { /* silent */ }
    }

    // ── State ──
    let allProjects = [];
    let filteredProjects = [];
    let sortKey = 'legacy_id';
    let sortDir = 'asc';
    let searchTerm = '';
    let editingId = null;          // PB record id of the project being edited, or null for new
    let existingHero = '';         // existing hero_image filename (server-side reference)
    let existingGallery = [];      // existing gallery filenames
    let pendingHero = null;        // File object for new hero upload
    let pendingGallery = [];       // Array of File objects for new gallery uploads
    let galleryToRemove = [];      // filenames to remove from gallery

    // ── DOM refs ──
    const loginView = document.getElementById('loginView');
    const dashView = document.getElementById('dashView');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const publishBtn = document.getElementById('publishBtn');
    const addBtn = document.getElementById('addBtn');
    const searchInput = document.getElementById('searchInput');
    const resultsCount = document.getElementById('resultsCount');
    const tableBody = document.getElementById('tableBody');
    const editModal = document.getElementById('editModal');
    const modalTitle = document.getElementById('modalTitle');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');
    const confirmModal = document.getElementById('confirmModal');
    const confirmMsg = document.getElementById('confirmMsg');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmOk = document.getElementById('confirmOk');
    const toast = document.getElementById('toast');

    const fields = {
      name: document.getElementById('fName'),
      nameEn: document.getElementById('fNameEn'),
      desc: document.getElementById('fDesc'),
      descEn: document.getElementById('fDescEn'),
      typology: document.getElementById('fTypology'),
      status: document.getElementById('fStatus'),
      visibility: document.getElementById('fVisibility'),
      year: document.getElementById('fYear'),
      yearStart: document.getElementById('fYearStart'),
      location: document.getElementById('fLocation'),
      region: document.getElementById('fRegion'),
      architect: document.getElementById('fArchitect'),
      size: document.getElementById('fSize'),
      client: document.getElementById('fClient'),
      contractor: document.getElementById('fContractor'),
      participation: document.getElementById('fParticipation'),
      budget: document.getElementById('fBudget'),
      dateCompleted: document.getElementById('fDateCompleted'),
      heroFile: document.getElementById('fHeroImage'),
      galleryFile: document.getElementById('fGallery'),
    };

    const heroPreview = document.getElementById('heroPreview');
    const galleryPreview = document.getElementById('galleryPreview');

    /* ──────────────────────────────────────────────────────────────
     * Toasts
     * ────────────────────────────────────────────────────────────── */
    let toastTimer = null;
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = (type === 'err' ? 'err' : 'ok');
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    /* ──────────────────────────────────────────────────────────────
     * Auth
     * ────────────────────────────────────────────────────────────── */
    function showLogin() { loginView.classList.remove('hidden'); dashView.classList.add('hidden'); stopIdleCheck(); }
    function showDash()  { loginView.classList.add('hidden');    dashView.classList.remove('hidden'); loadProjects(); updateInquiryBadge(); startIdleCheck(); }

    // Poll auth status every 60s — server logs you out after 30' of inactivity,
    // and this catches it without waiting for the user's next click.
    let idleTimer = null;
    function startIdleCheck() {
      stopIdleCheck();
      idleTimer = setInterval(async () => {
        try {
          const status = await api('/auth.php');
          if (!status.authenticated) showLogin();
        } catch (_) { /* api() already calls showLogin on 401 */ }
      }, 60000);
    }
    function stopIdleCheck() { if (idleTimer) { clearInterval(idleTimer); idleTimer = null; } }

    (async () => {
      try {
        const status = await api('/auth.php');
        if (status.authenticated) showDash();
        else if (!status.admin_exists) {
          loginError.textContent = 'Δεν υπάρχει διαχειριστής. Στείλτε POST στο /api/auth.php?action=setup με {email, password} ώστε να δημιουργηθεί.';
          loginError.style.display = 'block';
          showLogin();
        } else showLogin();
      } catch (_) { showLogin(); }
    })();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';
      try {
        await api('/auth.php', { method: 'POST', body: {
          email:    document.getElementById('loginEmail').value.trim(),
          password: document.getElementById('loginPassword').value,
        }});
        showDash();
      } catch (err) {
        loginError.textContent = err.message || 'Αποτυχία σύνδεσης';
        loginError.style.display = 'block';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try { await api('/auth.php?action=logout', { method: 'POST' }); } catch (_) {}
      showLogin();
    });

    /* ──────────────────────────────────────────────────────────────
     * Load / render
     * ────────────────────────────────────────────────────────────── */
    async function loadProjects() {
      try {
        allProjects = await api('/projects.php');
        applyFilterAndRender();
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="7" class="loading" style="color:var(--err);">Σφάλμα φόρτωσης: ${esc(err.message)}</td></tr>`;
      }
    }

    function applyFilterAndRender() {
      const q = searchTerm.toLowerCase();
      filteredProjects = allProjects.filter(p => !q
        || (p.name || '').toLowerCase().includes(q)
        || (p.name_en || '').toLowerCase().includes(q)
        || (p.typology || '').toLowerCase().includes(q)
        || (p.location || '').toLowerCase().includes(q)
        || (p.region || '').toLowerCase().includes(q)
        || String(p.legacy_id).includes(q)
      );
      filteredProjects.sort((a, b) => {
        const va = a[sortKey], vb = b[sortKey];
        let c;
        if (typeof va === 'number' && typeof vb === 'number') c = va - vb;
        else c = String(va || '').localeCompare(String(vb || ''), 'el');
        return sortDir === 'asc' ? c : -c;
      });
      renderTable();
    }

    function renderTable() {
      resultsCount.textContent = `${filteredProjects.length} / ${allProjects.length} έργα`;
      // Sort indicators
      document.querySelectorAll('th[data-sort]').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (th.dataset.sort === sortKey) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      });
      if (!filteredProjects.length) {
        tableBody.innerHTML = '<tr><td colspan="7" class="loading">Κανένα έργο.</td></tr>';
        return;
      }
      tableBody.innerHTML = filteredProjects.map(p => {
        const hasMap = (p.lat !== 0 && p.lat != null && p.lng !== 0 && p.lng != null) || (Array.isArray(p.map_points) && p.map_points.length > 0);
        const statusClass = 'status-' + (p.status || '').replace(/\s+/g, '');
        const isHidden = p.visibility === 'Hidden';
        const visIcon = isHidden ? '🚫' : '👁';
        const visTitle = isHidden ? 'Κρυφό — κλικ για δημοσιοποίηση' : 'Ορατό — κλικ για απόκρυψη';
        return `
          <tr data-id="${p.id}" class="${isHidden ? 'row-hidden' : ''}">
            <td class="id-cell">${p.legacy_id}</td>
            <td class="name-cell" title="${esc(p.name)}">${esc(p.name)}</td>
            <td>${esc(p.typology || '—')}</td>
            <td class="id-cell">${p.year || '—'}</td>
            <td class="status-cell"><span class="${statusClass}">${esc(p.status || '—')}</span></td>
            <td><span class="map-indicator ${hasMap ? 'placed' : 'empty'}" title="${hasMap ? 'Τοποθετημένο' : 'Χωρίς σημείο'}"></span></td>
            <td>
              <div class="row-actions">
                <button class="btn-sm vis-toggle" data-action="toggle-visibility" title="${visTitle}">${visIcon}</button>
                <button class="btn-sm" data-action="edit">Επεξεργασία</button>
                <button class="btn-sm" data-action="map">Χάρτης</button>
                <button class="btn-sm btn-danger" data-action="delete">Διαγραφή</button>
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

    /* ──────────────────────────────────────────────────────────────
     * Toolbar events
     * ────────────────────────────────────────────────────────────── */
    searchInput.addEventListener('input', () => { searchTerm = searchInput.value.trim(); applyFilterAndRender(); });
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.sort;
        if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        else { sortKey = k; sortDir = 'asc'; }
        applyFilterAndRender();
      });
    });

    addBtn.addEventListener('click', () => openEditor(null));

    tableBody.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const tr = btn.closest('tr');
      const id = Number(tr.dataset.id);
      const project = allProjects.find(p => p.id === id);
      if (!project) return;
      if (btn.dataset.action === 'edit') openEditor(project);
      else if (btn.dataset.action === 'map') window.location.href = 'map-editor?project=' + encodeURIComponent(project.legacy_id);
      else if (btn.dataset.action === 'delete') confirmDelete(project);
      else if (btn.dataset.action === 'toggle-visibility') toggleVisibility(project, btn);
    });

    async function toggleVisibility(project, btn) {
      const next = project.visibility === 'Hidden' ? 'Public' : 'Hidden';
      btn.disabled = true;
      try {
        await api('/projects.php?id=' + project.id, { method: 'PATCH', body: { visibility: next } });
        project.visibility = next;
        await loadProjects();
        showToast(next === 'Hidden' ? `#${project.legacy_id}: κρυφό` : `#${project.legacy_id}: ορατό`, 'ok');
      } catch (err) {
        showToast('Σφάλμα ορατότητας: ' + err.message, 'err');
        btn.disabled = false;
      }
    }

    /* ──────────────────────────────────────────────────────────────
     * Editor (add / edit)
     * ────────────────────────────────────────────────────────────── */
    function openEditor(project) {
      editingId = project ? project.id : null;
      modalTitle.textContent = project ? `Επεξεργασία Έργου #${project.legacy_id}` : 'Προσθήκη Έργου';

      fields.name.value = project?.name || '';
      fields.nameEn.value = project?.name_en || '';
      fields.desc.value = project?.description || '';
      fields.descEn.value = project?.description_en || '';
      fields.typology.value = project?.typology || '';
      fields.status.value = project?.status || 'Completed';
      fields.visibility.value = project?.visibility || 'Public';
      fields.year.value = project?.year || '';
      fields.yearStart.value = project?.year_start || '';
      fields.location.value = project?.location || '';
      fields.region.value = project?.region || '';
      fields.architect.value = project?.architect || '';
      fields.size.value = project?.size || '';
      fields.client.value = project?.client || '';
      fields.contractor.value = project?.contractor || '';
      fields.participation.value = project?.participation || '';
      fields.budget.value = project?.budget || '';
      fields.dateCompleted.value = project?.date_completed || '';

      existingHero = project?.hero_image || '';
      existingGallery = Array.isArray(project?.gallery) ? [...project.gallery] : [];
      pendingHero = null;
      pendingGallery = [];
      galleryToRemove = [];
      fields.heroFile.value = '';
      fields.galleryFile.value = '';
      renderHeroPreview(project);
      renderGalleryPreview(project);

      editModal.classList.add('open');
    }

    function closeEditor() {
      editModal.classList.remove('open');
      editingId = null;
    }

    cancelBtn.addEventListener('click', closeEditor);
    editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditor(); });

    function fileUrl(legacyId, filename) {
      return '/uploads/projects/' + legacyId + '/' + encodeURIComponent(filename);
    }

    /* Hero image preview */
    function renderHeroPreview(project) {
      heroPreview.innerHTML = '';
      if (pendingHero) {
        const url = URL.createObjectURL(pendingHero);
        heroPreview.innerHTML = `<div class="file-preview"><img src="${url}"><button type="button" class="remove" data-clear-hero>×</button></div>`;
      } else if (existingHero && project) {
        const url = fileUrl(project.legacy_id, existingHero);
        heroPreview.innerHTML = `<div class="file-preview"><img src="${url}"><button type="button" class="remove" data-clear-hero>×</button></div>`;
      }
    }
    fields.heroFile.addEventListener('change', () => {
      pendingHero = fields.heroFile.files[0] || null;
      renderHeroPreview(allProjects.find(p => p.id === editingId));
    });
    heroPreview.addEventListener('click', (e) => {
      if (e.target.matches('[data-clear-hero]')) {
        pendingHero = null;
        existingHero = '';
        fields.heroFile.value = '';
        renderHeroPreview(null);
      }
    });

    /* Gallery preview */
    function renderGalleryPreview(project) {
      galleryPreview.innerHTML = '';
      // Existing (kept) gallery files
      existingGallery.filter(f => !galleryToRemove.includes(f)).forEach(filename => {
        const url = project ? fileUrl(project.legacy_id, filename) : '';
        const div = document.createElement('div');
        div.className = 'file-preview';
        div.innerHTML = `<img src="${url}"><button type="button" class="remove" data-remove-existing="${esc(filename)}">×</button>`;
        galleryPreview.appendChild(div);
      });
      // Pending new uploads
      pendingGallery.forEach((file, idx) => {
        const url = URL.createObjectURL(file);
        const div = document.createElement('div');
        div.className = 'file-preview';
        div.innerHTML = `<img src="${url}"><button type="button" class="remove" data-remove-pending="${idx}">×</button>`;
        galleryPreview.appendChild(div);
      });
    }
    fields.galleryFile.addEventListener('change', () => {
      pendingGallery.push(...Array.from(fields.galleryFile.files));
      fields.galleryFile.value = '';
      renderGalleryPreview(allProjects.find(p => p.id === editingId));
    });
    galleryPreview.addEventListener('click', (e) => {
      const rmExist = e.target.getAttribute('data-remove-existing');
      const rmPend = e.target.getAttribute('data-remove-pending');
      if (rmExist) {
        galleryToRemove.push(rmExist);
        renderGalleryPreview(allProjects.find(p => p.id === editingId));
      } else if (rmPend != null) {
        pendingGallery.splice(Number(rmPend), 1);
        renderGalleryPreview(allProjects.find(p => p.id === editingId));
      }
    });

    async function uploadFile(projectId, file, kind) {
      const fd = new FormData();
      fd.append('project_id', String(projectId));
      fd.append('kind', kind);
      fd.append('file', file);
      const res = await fetch(API + '/upload.php', { method: 'POST', body: fd, credentials: 'same-origin' });
      const j = await res.json().catch(() => null);
      if (!res.ok || !j || j.ok === false) throw new Error((j && j.error) || ('Upload HTTP ' + res.status));
      return j.data.filename;
    }

    /* Save flow:
     *  1. If creating, POST a stub with metadata only (gets back the id+legacy_id).
     *  2. Upload each pending file via /api/upload.php (needs the legacy_id as project_id for the folder).
     *  3. PATCH the record with the final hero_image + gallery filename arrays. */
    saveBtn.addEventListener('click', async () => {
      if (!fields.name.value.trim()) { showToast('Απαιτείται το όνομα', 'err'); return; }
      saveBtn.disabled = true;
      try {
        const meta = {
          name:           fields.name.value.trim(),
          name_en:        fields.nameEn.value.trim(),
          description:    fields.desc.value,
          description_en: fields.descEn.value,
          typology:       fields.typology.value,
          status:         fields.status.value,
          visibility:     fields.visibility.value,
          location:       fields.location.value.trim(),
          region:         fields.region.value,
          architect:      fields.architect.value.trim(),
          size:           fields.size.value.trim(),
          client:         fields.client.value.trim(),
          contractor:     fields.contractor.value.trim(),
          participation:  fields.participation.value.trim(),
          date_completed: fields.dateCompleted.value.trim(),
          year:           fields.year.value      ? Number(fields.year.value)      : null,
          year_start:     fields.yearStart.value ? Number(fields.yearStart.value) : null,
          budget:         fields.budget.value    ? Number(fields.budget.value)    : null,
        };

        // Resolve target record (create-then-upload flow for new projects).
        let saved;
        if (editingId) {
          saved = allProjects.find(p => p.id === editingId);
        } else {
          saved = await api('/projects.php', { method: 'POST', body: meta });
        }
        const legacy = saved.legacy_id;

        // Upload pending files now that we know the project id/folder.
        let heroFilename = existingHero;
        if (pendingHero) heroFilename = await uploadFile(legacy, pendingHero, 'hero');
        const newGalleryFilenames = [];
        for (const f of pendingGallery) newGalleryFilenames.push(await uploadFile(legacy, f, 'gallery'));
        const finalGallery = existingGallery.filter(f => !galleryToRemove.includes(f)).concat(newGalleryFilenames);

        const finalPayload = Object.assign({}, meta, {
          hero_image: heroFilename,
          gallery:    finalGallery,
        });
        const updated = await api('/projects.php?id=' + saved.id, { method: 'PATCH', body: finalPayload });

        showToast(`${editingId ? 'Αποθηκεύτηκε' : 'Δημιουργήθηκε'} έργο #${updated.legacy_id}`, 'ok');
        closeEditor();
        await loadProjects();
      } catch (err) {
        showToast('Σφάλμα: ' + (err.message || 'Αποτυχία αποθήκευσης'), 'err');
      } finally {
        saveBtn.disabled = false;
      }
    });

    /* ──────────────────────────────────────────────────────────────
     * Delete
     * ────────────────────────────────────────────────────────────── */
    let pendingDelete = null;
    function confirmDelete(project) {
      pendingDelete = project;
      confirmMsg.textContent = `Διαγραφή του έργου "${project.name}" (#${project.legacy_id});`;
      confirmModal.classList.add('open');
    }
    confirmCancel.addEventListener('click', () => { confirmModal.classList.remove('open'); pendingDelete = null; });
    confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) { confirmModal.classList.remove('open'); pendingDelete = null; } });
    confirmOk.addEventListener('click', async () => {
      if (!pendingDelete) return;
      try {
        await api('/projects.php?id=' + pendingDelete.id, { method: 'DELETE' });
        showToast(`Διαγράφηκε #${pendingDelete.legacy_id}`, 'ok');
        confirmModal.classList.remove('open');
        pendingDelete = null;
        await loadProjects();
      } catch (err) {
        showToast('Σφάλμα διαγραφής: ' + err.message, 'err');
      }
    });

    /* ──────────────────────────────────────────────────────────────
     * Publish — multi-state modal (confirm → loading → success/error)
     * ────────────────────────────────────────────────────────────── */
    const publishModal = document.getElementById('publishModal');
    const publishBody = document.getElementById('publishBody');
    let isPublishing = false;

    function closePublishModal() {
      if (isPublishing) return;
      publishModal.classList.remove('open');
    }

    function renderPublishConfirm() {
      publishBody.innerHTML = `
        <div class="publish-icon is-confirm">📤</div>
        <h3>Δημοσίευση αλλαγών;</h3>
        <p>Ο δημόσιος ιστότοπος θα ενημερωθεί με όλες τις αποθηκευμένες αλλαγές. Τα "κρυφά" έργα δεν θα εμφανιστούν.</p>
        <div class="publish-actions">
          <button type="button" class="btn-ghost" data-act="cancel">Ακύρωση</button>
          <button type="button" class="btn-primary" data-act="confirm">Δημοσίευση</button>
        </div>`;
    }

    function renderPublishLoading() {
      publishBody.innerHTML = `
        <div class="publish-icon is-loading"><span class="spinner"></span></div>
        <h3>Δημοσίευση σε εξέλιξη…</h3>
        <p>Ενημερώνεται ο ιστότοπος.</p>`;
    }

    function renderPublishSuccess() {
      publishBody.innerHTML = `
        <div class="publish-icon is-success">✓</div>
        <h3>Δημοσιεύτηκε επιτυχώς</h3>
        <p>Οι αλλαγές είναι πλέον ζωντανές στον ιστότοπο.</p>
        <div class="publish-actions">
          <a href="/" target="_blank" class="btn-primary">Προβολή Ιστότοπου</a>
          <button type="button" class="btn-ghost" data-act="close">Κλείσιμο</button>
        </div>`;
    }

    function renderPublishError(msg) {
      publishBody.innerHTML = `
        <div class="publish-icon is-error">✕</div>
        <h3>Σφάλμα δημοσίευσης</h3>
        <p>${esc(msg)}</p>
        <div class="publish-actions">
          <button type="button" class="btn-ghost" data-act="close">Κλείσιμο</button>
          <button type="button" class="btn-primary" data-act="confirm">Δοκιμή ξανά</button>
        </div>`;
    }

    async function runPublish() {
      isPublishing = true;
      renderPublishLoading();
      try {
        await api('/publish.php', { method: 'POST' });
        isPublishing = false;
        renderPublishSuccess();
      } catch (err) {
        isPublishing = false;
        renderPublishError(err.message);
      }
    }

    // Event delegation: a single listener handles every button in every state.
    publishBody.addEventListener('click', (e) => {
      const act = e.target?.dataset?.act;
      if (!act) return;
      if (act === 'cancel' || act === 'close') closePublishModal();
      else if (act === 'confirm') runPublish();
    });

    publishBtn.addEventListener('click', () => {
      renderPublishConfirm();
      publishModal.classList.add('open');
    });

    publishModal.addEventListener('click', (e) => {
      if (e.target === publishModal) closePublishModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && publishModal.classList.contains('open')) closePublishModal();
    });
  </script>
</body>
</html>
