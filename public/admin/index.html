<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMELI — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2e2e2f;
      --bg-dark: #252526;
      --bg-card: #353536;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.25);
      --white: #ffffff;
      --gray: rgba(255,255,255,0.5);
      --accent: #FF731E;
      --danger: #d4574e;
      --font-display: 'CF Mod Grotesk', sans-serif;
      --font-body: 'CF Mod Grotesk', sans-serif;
    }

    /* Login gate — hides admin until authenticated */
    body.admin-gated .admin-header,
    body.admin-gated .admin-main,
    body.admin-gated .modal-overlay {
      display: none !important;
    }

    .login-gate {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-gate.is-hidden {
      display: none;
    }

    .login-box {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 48px 40px;
      width: 380px;
      max-width: 90vw;
      text-align: center;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-box .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .login-box.shake {
      animation: shake 0.4s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--white);
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .admin-header h1 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .admin-header h1 span {
      color: var(--gray);
      font-weight: 400;
      font-size: 14px;
      margin-left: 12px;
    }

    .admin-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 24px;
      border: 1px solid var(--border);
      background: none;
      color: var(--white);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.04);
    }

    .btn-accent {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent:hover {
      background: rgba(200,184,154,0.1);
    }

    .btn-danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(212,87,78,0.1);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 11px;
    }

    .btn-publish {
      border-color: #6abf69;
      color: #6abf69;
    }

    .btn-publish:hover {
      background: rgba(106,191,105,0.1);
    }

    .btn-import {
      cursor: pointer;
      border-color: rgba(255,255,255,0.3);
    }

    .btn-import:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .admin-status {
      font-size: 12px;
      font-weight: 400;
      color: var(--gray);
      margin-right: 8px;
    }

    .admin-status.is-published {
      color: #6abf69;
    }

    /* Main */
    .admin-main {
      padding: 32px 40px;
    }

    /* Table */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }

    .admin-table th {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-hover);
    }

    .admin-table td {
      font-size: 14px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .admin-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .admin-table .thumb {
      width: 60px;
      height: 40px;
      background-color: var(--bg);
      background-size: cover;
      background-position: center;
      border: 1px solid var(--border);
      filter: grayscale(80%);
    }

    .admin-table .cell-name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
    }

    .admin-table .cell-actions {
      display: flex;
      gap: 6px;
    }

    .cell-map-pos {
      font-size: 12px;
      color: var(--gray);
      font-family: monospace;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal {
      background: var(--bg);
      border: 1px solid var(--border);
      width: 800px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group select option {
      background: var(--bg-dark);
    }

    /* Map picker */
    .map-picker {
      grid-column: 1 / -1;
      margin-top: 8px;
    }

    .map-picker label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      display: block;
      margin-bottom: 8px;
    }

    .map-picker-coords {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .map-picker-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border);
      cursor: crosshair;
      user-select: none;
    }

    .map-picker-container img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0.33;
    }

    .map-picker-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border: 2px solid var(--white);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
      box-shadow: 0 0 0 3px rgba(200,184,154,0.3);
    }

    .map-picker-dot.is-placed {
      display: block;
    }

    /* Image upload area */
    .img-upload-area {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--bg-dark);
      border: 2px dashed var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    .img-upload-area:hover,
    .img-upload-area.is-dragover {
      border-color: var(--accent);
      background: rgba(200,184,154,0.04);
    }

    .img-upload-area.has-image {
      border-style: solid;
      border-color: var(--border);
    }

    .img-preview {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      position: absolute;
      inset: 0;
    }

    .img-upload-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
      color: var(--gray);
      font-size: 13px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    .img-upload-area.has-image .img-upload-prompt {
      display: none;
    }

    .btn-remove-img {
      margin-top: 8px;
      border-color: var(--danger);
      color: var(--danger);
      font-size: 11px;
      padding: 4px 12px;
    }

    .btn-remove-img:hover {
      background: rgba(212,87,78,0.1);
    }

    /* Gallery upload */
    .gallery-upload-area {
      border: 2px dashed var(--border);
      padding: 16px;
      min-height: 100px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .gallery-upload-area:hover,
    .gallery-upload-area.is-dragover {
      border-color: var(--accent);
    }

    .gallery-upload-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--gray);
      padding: 20px 0;
    }

    .gallery-thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }

    .gallery-thumb {
      position: relative;
      width: 80px;
      height: 80px;
      background-size: cover;
      background-position: center;
      border: 1px solid var(--border);
    }

    .gallery-thumb-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      padding: 0;
    }

    /* Form footer */
    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray);
      font-size: 15px;
    }
  </style>
</head>
<body class="admin-gated">

  <!-- Login gate -->
  <div class="login-gate" id="loginGate">
    <div class="login-box">
      <h1 class="login-title">THEMELI</h1>
      <p class="login-subtitle">Admin Panel</p>
      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="admin@themeli.gr" autofocus>
        </div>
        <div class="form-group">
          <label>Κωδικός</label>
          <input type="password" id="loginPassword" placeholder="Εισάγετε κωδικό">
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn btn-accent login-btn">Σύνδεση</button>
      </form>
    </div>
  </div>

  <header class="admin-header">
    <h1>THEMELI <span>Admin Panel</span></h1>
    <div class="admin-actions">
      <span class="admin-status" id="adminStatus"></span>
      <a href="../el/projects.html" class="btn btn-sm" target="_blank">Προβολή Σελίδας</a>
      <button class="btn btn-sm btn-accent" id="addProjectBtn">+ Προσθήκη Έργου</button>
      <button class="btn btn-sm btn-publish" id="publishBtn">Δημοσίευση</button>
      <button class="btn btn-sm" id="exportBtn">Εξαγωγή</button>
      <label class="btn btn-sm btn-import" for="importFile">Εισαγωγή</label>
      <input type="file" id="importFile" accept=".js" style="display:none">
      <button class="btn btn-sm btn-danger" id="logoutBtn">Αποσύνδεση</button>
    </div>
  </header>

  <main class="admin-main">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Εικόνα</th>
          <th>Όνομα</th>
          <th>Έτος</th>
          <th>Τυπολογία</th>
          <th>Τοποθεσία</th>
          <th>Περιοχή</th>
          <th>Χάρτης</th>
          <th>Ενέργειες</th>
        </tr>
      </thead>
      <tbody id="adminTableBody">
      </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">Δεν υπάρχουν έργα. Κάντε κλικ στο «+ Προσθήκη Έργου» για να ξεκινήσετε.</div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Προσθήκη Έργου</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Όνομα Έργου</label>
          <input type="text" id="fName" placeholder="π.χ. Επέκταση Τραμ Αθήνας">
        </div>
        <div class="form-group">
          <label>Όνομα (Αγγλικά)</label>
          <input type="text" id="fNameEn" placeholder="e.g. Athens-Thessaloniki Railway">
        </div>
        <div class="form-group">
          <label>Έτος</label>
          <input type="number" id="fYear" placeholder="π.χ. 2004" min="1900" max="2100">
        </div>
        <div class="form-group">
          <label>Τυπολογία</label>
          <select id="fTypology">
            <option value="Buildings">Κτίρια</option>
            <option value="Railways">Σιδηρόδρομοι</option>
            <option value="Roadworks">Οδοποιία</option>
            <option value="Tunnels">Σήραγγες</option>
            <option value="Industrial & Energy">Βιομηχανικά & Ενέργεια</option>
            <option value="Utility Networks">Δίκτυα Κοινής Ωφέλειας</option>
            <option value="Dams">Φράγματα</option>
            <option value="Ports & Marine">Λιμάνια & Θαλάσσια</option>
            <option value="Urban Redevelopment">Αστική Ανάπλαση</option>
          </select>
        </div>
        <div class="form-group">
          <label>Τοποθεσία</label>
          <input type="text" id="fLocation" placeholder="π.χ. Αθήνα">
        </div>
        <div class="form-group">
          <label>Περιοχή</label>
          <select id="fRegion">
            <option value="">— Επιλέξτε —</option>
            <option value="Attica">Αττική</option>
            <option value="Peloponnese">Πελοπόννησος</option>
            <option value="Central Greece">Στερεά Ελλάδα</option>
            <option value="Thessaly">Θεσσαλία</option>
            <option value="Northern Greece">Βόρεια Ελλάδα</option>
            <option value="Crete">Κρήτη</option>
            <option value="Islands">Νησιά</option>
          </select>
        </div>
        <div class="form-group">
          <label>Αρχιτέκτονας</label>
          <input type="text" id="fArchitect" placeholder="π.χ. Gehry Partners">
        </div>
        <div class="form-group">
          <label>Μέγεθος</label>
          <input type="text" id="fSize" placeholder="π.χ. 110.000 ft² / 10.219 m²">
        </div>
        <div class="form-group">
          <label>Κατάσταση</label>
          <select id="fStatus">
            <option value="Completed">Ολοκληρωμένο</option>
            <option value="In Progress">Σε Εξέλιξη</option>
            <option value="Planning">Σχεδιασμός</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ημερομηνία Ολοκλήρωσης</label>
          <input type="text" id="fDateCompleted" placeholder="π.χ. 2003">
        </div>
        <div class="form-group full">
          <label>Περιγραφή</label>
          <textarea id="fDesc" placeholder="Σύντομη περιγραφή έργου..."></textarea>
        </div>
        <div class="form-group full">
          <label>Περιγραφή (Αγγλικά)</label>
          <textarea id="fDescEn" placeholder="Brief project description in English..."></textarea>
        </div>
        <div class="form-group">
          <label>Εικόνα Έργου</label>
          <div class="img-upload-area" id="fImageDropzone">
            <div class="img-preview" id="fImagePreview"></div>
            <div class="img-upload-prompt" id="fImagePrompt">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Κλικ ή σύρετε εικόνα</span>
            </div>
            <input type="file" id="fImageFile" accept="image/*" style="display:none">
          </div>
          <input type="hidden" id="fImage">
          <button type="button" class="btn btn-sm btn-remove-img" id="fImageRemove" style="display:none">Αφαίρεση Εικόνας</button>
        </div>
        <div class="form-group full">
          <label>Φωτογραφίες Έργου (Gallery)</label>
          <div class="gallery-upload-area" id="fGalleryDropzone">
            <div class="gallery-thumbs" id="fGalleryThumbs"></div>
            <div class="gallery-upload-prompt" id="fGalleryPrompt">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Κλικ ή σύρετε φωτογραφίες</span>
            </div>
            <input type="file" id="fGalleryFile" accept="image/*" multiple style="display:none">
          </div>
        </div>
        <div class="map-picker">
          <label>Θέση στον Χάρτη <span style="font-weight:300;text-transform:none;letter-spacing:0">(κλικ στον χάρτη για τοποθέτηση)</span></label>
          <div class="map-picker-coords" id="mapPickerCoords">X: — Y: —</div>
          <div class="map-picker-container" id="mapPickerContainer">
            <img src="../assets/greece-map.png" alt="Greece">
            <div class="map-picker-dot" id="mapPickerDot"></div>
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button class="btn" id="modalCancel">Ακύρωση</button>
        <button class="btn btn-accent" id="modalSave">Αποθήκευση</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
